<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Sukuk Screener{% endblock %}</title>
    <!-- Tailwind via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
    tailwind.config = {
        theme: {
            extend: {
                colors: {
                    brand: { 50:'#f0fdf4', 100:'#dcfce7', 200:'#bbf7d0',
                             500:'#22c55e', 600:'#16a34a', 700:'#15803d',
                             800:'#166534', 900:'#14532d' },
                }
            }
        }
    }
    </script>
    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <style>
        .htmx-indicator { display:none; }
        .htmx-request .htmx-indicator { display:inline-block; }
        .htmx-request.htmx-indicator { display:inline-block; }
        [data-sort-active="true"] { font-weight: 700; text-decoration: underline; }
        .fade-in { animation: fadeIn 0.2s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
    {% block head %}{% endblock %}
</head>
<body class="h-full bg-gray-50 text-gray-900">
    <!-- Nav -->
    <nav class="bg-brand-800 text-white shadow">
        <div class="max-w-screen-2xl mx-auto px-4 py-3 flex items-center justify-between">
            <a href="/" class="text-lg font-semibold tracking-tight">
                <span class="text-brand-200">Sukuk</span> Screener
            </a>
            <div class="flex items-center gap-4 text-sm">
                {% if latest_date %}
                <span class="text-brand-200">Data: {{ latest_date }}</span>
                {% endif %}
                <button
                    hx-post="/api/ingest"
                    hx-swap="none"
                    hx-indicator="#ingest-spin"
                    class="bg-brand-600 hover:bg-brand-500 px-3 py-1 rounded text-sm transition"
                    onclick="this.disabled=true; setTimeout(()=>location.reload(), 5000)"
                >
                    ↻ Refresh Data
                </button>
                <span id="ingest-spin" class="htmx-indicator text-brand-200">⏳</span>
            </div>
        </div>
    </nav>

    <main class="max-w-screen-2xl mx-auto px-4 py-6">
        {% block content %}{% endblock %}
    </main>

    <footer class="text-center text-xs text-gray-400 py-4">
        Sukuk Screener v0.1 · Data from Emirates Islamic · Zakat per AAOIFI guidelines
    </footer>

    {% block scripts %}{% endblock %}
</body>
</html>
